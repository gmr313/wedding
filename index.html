<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Geri &amp; Gerry — Help us capture the day</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Monsieur+La+Doulaise&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #161412;
    --ink-soft: #5a5650;
    --line: #d9d4cc;
    --line-soft: #e7e2da;
    --bg: #faf8f4;
    --paper: #ffffff;
    --radius: 3px;
    --serif: "Cormorant Garamond", Georgia, serif;
    --script: "Monsieur La Doulaise", "Cormorant Garamond", cursive;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root { min-height: 100vh; }
  .label {
    font-family: var(--serif);
    text-transform: uppercase;
    letter-spacing: 0.32em;
    font-weight: 500;
    font-size: 12px;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  button { font-family: var(--serif); cursor: pointer; }
  input, textarea { font-family: var(--serif); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pop { 0% { transform: scale(.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="upload-core.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</html>
